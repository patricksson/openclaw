<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Automatyn</title>
    <meta name="description" content="Sign in to your Automatyn dashboard to manage your AI WhatsApp receptionist.">
    <meta name="robots" content="noindex">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23030303'/><text x='50' y='68' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='65' fill='%2322d3ee'>A</text></svg>">
    <link rel="canonical" href="https://automatyn.co/login.html">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400;500;700;800&display=swap" rel="stylesheet">

    <style>
      html { -webkit-text-size-adjust:100%; }
      body { font-family:'DM Sans', sans-serif; background:#030303; color:#f5f5f5; -webkit-font-smoothing:antialiased; min-height:100vh; }
      .heading { font-family:'Cabinet Grotesk', sans-serif; letter-spacing:-0.04em; }
      .urgency-banner { background:#0f0f0f; border-bottom:1px solid rgba(34,211,238,0.15); }

      .bg-ambient { position:relative; overflow:hidden; }
      .bg-ambient::before { content:""; position:absolute; inset:-40%; background:
        radial-gradient(600px 400px at 30% 0%, rgba(34,211,238,0.08), transparent 60%),
        radial-gradient(500px 350px at 80% 60%, rgba(16,185,129,0.05), transparent 60%);
        pointer-events:none; z-index:0; }

      .glass { background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
        border:1px solid rgba(255,255,255,0.08); border-radius:20px; backdrop-filter: blur(14px);
        box-shadow: 0 30px 80px rgba(0,0,0,0.6); }

      .field { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:12px;
        padding:.85rem 1rem; color:#fff; width:100%; font-size:15px; transition:border-color .15s, background .15s; font-family:'DM Sans', sans-serif; }
      .field:focus { outline:none; border-color:#22d3ee; background:rgba(255,255,255,0.05); }
      .field::placeholder { color:#525252; }

      .cta-primary { background: linear-gradient(180deg, #10b981 0%, #059669 100%);
        box-shadow: 0 10px 30px rgba(16,185,129,0.25); transition: transform .15s, box-shadow .2s, opacity .15s; }
      .cta-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 14px 36px rgba(16,185,129,0.35); }
      .cta-primary:disabled { opacity:.5; cursor: not-allowed; }

      .fade-up { opacity:0; transform:translateY(12px); animation: fadeUp .6s ease forwards; }
      @keyframes fadeUp { to { opacity:1; transform:none } }

      .spin { border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; width:16px; height:16px; animation: spin 1s linear infinite; display:inline-block; }
      @keyframes spin { to { transform:rotate(360deg); } }

      @media (max-width:480px){ .glass { border-radius:16px; } }
    </style>
</head>
<body class="bg-ambient">

<div class="urgency-banner text-white text-center py-2.5 px-4 text-xs sm:text-sm font-medium fixed top-0 w-full z-[60]">
  <strong class="text-white">Automatyn</strong> <span class="text-gray-400">— AI WhatsApp receptionist</span>
</div>

<nav class="fixed top-[38px] w-full bg-black/90 backdrop-blur-md z-50 border-b border-white/5">
  <div class="max-w-6xl mx-auto px-4 sm:px-6">
    <div class="flex justify-between items-center h-16">
      <a href="/" class="no-underline heading text-2xl font-extrabold">Automatyn<span class="text-cyan-400">.</span></a>
      <div class="text-xs sm:text-sm text-gray-400">
        No account? <a href="/signup.html" class="text-cyan-400 hover:text-cyan-300 font-semibold">Start free</a>
      </div>
    </div>
  </div>
</nav>

<main class="pt-32 sm:pt-36 pb-12 px-4 relative z-10 flex justify-center">
  <div class="w-full max-w-md">
    <div class="glass p-7 sm:p-9 fade-up">
      <h1 class="heading text-3xl sm:text-4xl font-extrabold mb-2">Welcome back</h1>
      <p class="text-sm sm:text-base text-gray-400 mb-7">Sign in to your Automatyn dashboard.</p>

      <form id="login-form" class="space-y-5" novalidate>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider" for="email">Email</label>
          <input class="field" id="email" name="email" type="email" autocomplete="email" required placeholder="you@business.com" inputmode="email" />
        </div>

        <div>
          <div class="flex justify-between items-end mb-2">
            <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider" for="password">Password</label>
            <a href="/forgot-password.html" class="text-xs text-cyan-400 hover:text-cyan-300 font-semibold">Forgot?</a>
          </div>
          <div class="relative">
            <input class="field pr-12" id="password" name="password" type="password" autocomplete="current-password" required placeholder="Your password" />
            <button type="button" id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-white font-semibold px-2 py-1" aria-label="Show password">Show</button>
          </div>
        </div>

        <div id="error-box" class="hidden text-sm text-red-400 bg-red-950/30 border border-red-900/40 rounded-lg px-3 py-2.5"></div>

        <button id="submit-btn" type="submit" class="cta-primary w-full text-white py-3.5 rounded-xl font-semibold text-sm sm:text-base flex items-center justify-center gap-2">
          <span id="btn-text">Sign in</span>
        </button>
      </form>

      <div class="text-center text-xs text-gray-500 mt-6">
        Protected by industry-standard security. We check against known breaches.
      </div>
    </div>
  </div>
</main>

<script>
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:3001'
    : 'https://api.automatyn.co';

  const pwInput = document.getElementById('password');
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const b = document.getElementById('toggle-pw');
    if (pwInput.type === 'password') { pwInput.type='text'; b.textContent='Hide'; }
    else { pwInput.type='password'; b.textContent='Show'; }
  });

  const form = document.getElementById('login-form');
  const btn = document.getElementById('submit-btn');
  const btnText = document.getElementById('btn-text');
  const errBox = document.getElementById('error-box');

  function showError(msg) { errBox.textContent = msg; errBox.classList.remove('hidden'); }
  function hideError() { errBox.classList.add('hidden'); }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    const email = document.getElementById('email').value.trim().toLowerCase();
    const password = pwInput.value;

    if (!email || !password) { showError('Enter your email and password.'); return; }

    btn.disabled = true;
    btnText.innerHTML = '<span class="spin"></span> Signing in…';

    try {
      const res = await fetch(`${API}/api/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Sign in failed.');
        btn.disabled = false;
        btnText.textContent = 'Sign in';
        return;
      }

      if (data.token) localStorage.setItem('automatyn_jwt', data.token);
      if (data.agentId) localStorage.setItem('automatyn_agent', data.agentId);
      if (data.email) localStorage.setItem('automatyn_email', data.email);

      // Redirect to dashboard (banner will prompt for verification if needed)
      window.location.href = '/dashboard.html';
    } catch (err) {
      showError('Network error. Please try again.');
      btn.disabled = false;
      btnText.textContent = 'Sign in';
    }
  });
</script>
</body>
</html>
