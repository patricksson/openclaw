<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign in — Automatyn</title>
    <meta name="description" content="Sign in to your Automatyn dashboard to manage your AI WhatsApp receptionist.">
    <meta name="robots" content="noindex">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23030303'/><text x='50' y='68' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='65' fill='%2322d3ee'>A</text></svg>">
    <link rel="canonical" href="https://automatyn.co/login.html">

    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400;500;700;800&display=swap" rel="stylesheet">

    <style>
      html { -webkit-text-size-adjust:100%; }
      body { font-family:'DM Sans', sans-serif; background:#030303; color:#f5f5f5; -webkit-font-smoothing:antialiased; min-height:100vh; }
      .heading { font-family:'Cabinet Grotesk', sans-serif; letter-spacing:-0.04em; }
      .urgency-banner { background:#0f0f0f; border-bottom:1px solid rgba(34,211,238,0.15); }

      .bg-ambient { position:relative; overflow:hidden; }
      .bg-ambient::before { content:""; position:absolute; inset:-40%; background:
        radial-gradient(600px 400px at 30% 0%, rgba(34,211,238,0.08), transparent 60%),
        radial-gradient(500px 350px at 80% 60%, rgba(16,185,129,0.05), transparent 60%);
        pointer-events:none; z-index:0; }

      .glass { background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
        border:1px solid rgba(255,255,255,0.08); border-radius:20px; backdrop-filter: blur(14px);
        box-shadow: 0 30px 80px rgba(0,0,0,0.6); }

      .field { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:12px;
        padding:.85rem 1rem; color:#fff; width:100%; font-size:15px; transition:border-color .15s, background .15s; font-family:'DM Sans', sans-serif; }
      .field:focus { outline:none; border-color:#22d3ee; background:rgba(255,255,255,0.05); }
      .field::placeholder { color:#525252; }

      .cta-primary { background: linear-gradient(180deg, #10b981 0%, #059669 100%);
        box-shadow: 0 10px 30px rgba(16,185,129,0.25); transition: transform .15s, box-shadow .2s, opacity .15s; }
      .cta-primary:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 14px 36px rgba(16,185,129,0.35); }
      .cta-primary:disabled { opacity:.5; cursor: not-allowed; }

      .fade-up { opacity:0; transform:translateY(12px); animation: fadeUp .6s ease forwards; }
      @keyframes fadeUp { to { opacity:1; transform:none } }

      .spin { border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; width:16px; height:16px; animation: spin 1s linear infinite; display:inline-block; }
      @keyframes spin { to { transform:rotate(360deg); } }

      @media (max-width:480px){ .glass { border-radius:16px; } }
    </style>
</head>
<body class="bg-ambient">

<div class="urgency-banner text-white text-center py-2.5 px-4 text-xs sm:text-sm font-medium fixed top-0 w-full z-[60]">
  <strong class="text-white">Automatyn</strong> <span class="text-gray-400">— AI WhatsApp receptionist</span>
</div>

<nav class="fixed top-[38px] w-full bg-black/90 backdrop-blur-md z-50 border-b border-white/5">
  <div class="max-w-6xl mx-auto px-4 sm:px-6">
    <div class="flex justify-between items-center h-16">
      <a href="/" class="no-underline">
          <span style="font-family: 'Cabinet Grotesk', sans-serif !important; letter-spacing: -0.04em;" class="text-2xl font-extrabold">Automatyn<span class="text-cyan-400">.</span></span>
        </a>
      <div class="text-xs sm:text-sm text-gray-400">
        No account? <a href="/signup.html" class="text-cyan-400 hover:text-cyan-300 font-semibold">Start free</a>
      </div>
    </div>
  </div>
</nav>

<main class="pt-32 sm:pt-36 pb-12 px-4 relative z-10 flex justify-center">
  <div class="w-full max-w-md">
    <!-- Form card -->
    <div id="form-state" class="glass p-7 sm:p-9 fade-up">
      <h1 class="heading text-3xl sm:text-4xl font-extrabold mb-2">Welcome back</h1>
      <p class="text-sm sm:text-base text-gray-400 mb-7">Enter your email — we'll send you a sign-in link. No password needed.</p>

      <!-- Google Sign-In -->
      <div id="g_id_onload"
        data-client_id="513753338746-ufb5frmpc6br5e8q8nuget99iokbt20s.apps.googleusercontent.com"
        data-callback="handleGoogleSignIn"
        data-auto_prompt="false">
      </div>
      <div class="flex justify-center mb-4">
        <div class="g_id_signin"
          data-type="standard"
          data-shape="rectangular"
          data-theme="filled_black"
          data-text="continue_with"
          data-size="large"
          data-logo_alignment="left"
          data-width="360">
        </div>
      </div>

      <div class="flex items-center gap-3 mb-5">
        <div class="flex-1 h-px bg-white/10"></div>
        <span class="text-xs text-gray-500 uppercase tracking-wider">or</span>
        <div class="flex-1 h-px bg-white/10"></div>
      </div>

      <form id="login-form" class="space-y-5" novalidate>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider" for="email">Email</label>
          <input class="field" id="email" name="email" type="email" autocomplete="email" required placeholder="you@business.com" inputmode="email" />
        </div>

        <div id="error-box" class="hidden text-sm text-red-400 bg-red-950/30 border border-red-900/40 rounded-lg px-3 py-2.5"></div>

        <button id="submit-btn" type="submit" class="cta-primary w-full text-white py-3.5 rounded-xl font-semibold text-sm sm:text-base flex items-center justify-center gap-2">
          <span id="btn-text">Email me a sign-in link</span>
        </button>
      </form>

      <div class="text-center text-xs text-gray-500 mt-6">
        No passwords to remember. Link expires in 15 minutes.
      </div>
    </div>

    <!-- Email sent state -->
    <div id="sent-state" class="glass p-7 sm:p-9 text-center hidden">
      <div class="w-16 h-16 rounded-full bg-emerald-500/15 border border-emerald-500/30 flex items-center justify-center mx-auto mb-5">
        <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3 8l9 6 9-6M5 6h14a2 2 0 012 2v8a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2z"/></svg>
      </div>
      <h2 class="heading text-xl sm:text-2xl font-extrabold mb-3">Check your email</h2>
      <p class="text-gray-400 text-sm sm:text-base mb-6 leading-relaxed">
        We've sent a sign-in link to<br>
        <strong id="sent-email" class="text-white"></strong>
      </p>
      <div class="text-xs text-gray-500 mb-4">The link expires in 15 minutes.</div>
      <button id="resend-btn" class="text-sm text-cyan-400 hover:text-cyan-300 font-semibold">Didn't get it? Resend</button>
      <div id="resend-status" class="text-xs text-gray-500 mt-3 hidden"></div>
    </div>
  </div>
</main>

<script>
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:3001'
    : 'https://api.automatyn.co';

  // If already logged in, go straight to dashboard
  if (localStorage.getItem('jwt')) {
    window.location.href = '/dashboard.html';
  }

  // Google Sign-In callback
  async function handleGoogleSignIn(response) {
    const errBox = document.getElementById('error-box');
    errBox.classList.add('hidden');
    try {
      const res = await fetch(`${API}/api/auth/google`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ credential: response.credential })
      });
      const data = await res.json();
      if (!res.ok) {
        errBox.textContent = data.error || 'Google sign-in failed.';
        errBox.classList.remove('hidden');
        return;
      }
      localStorage.setItem('jwt', data.token);
      localStorage.setItem('agentId', data.agentId);
      localStorage.setItem('email', data.email);
      if (data.isNewUser) {
        window.location.href = '/onboard.html';
      } else {
        window.location.href = '/dashboard.html';
      }
    } catch (err) {
      errBox.textContent = 'Network error. Please try again.';
      errBox.classList.remove('hidden');
    }
  }
  window.handleGoogleSignIn = handleGoogleSignIn;

  const form = document.getElementById('login-form');
  const btn = document.getElementById('submit-btn');
  const btnText = document.getElementById('btn-text');
  const errBox = document.getElementById('error-box');

  function showError(msg) { errBox.textContent = msg; errBox.classList.remove('hidden'); }
  function hideError() { errBox.classList.add('hidden'); }

  async function sendMagicLink(email) {
    const res = await fetch(`${API}/api/auth/magic-link`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email })
    });
    return { res, data: await res.json() };
  }

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    hideError();
    const email = document.getElementById('email').value.trim().toLowerCase();

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Please enter a valid email.'); return; }

    btn.disabled = true;
    btnText.innerHTML = '<span class="spin"></span> Sending link…';

    try {
      const { res, data } = await sendMagicLink(email);

      if (!res.ok) {
        showError(data.error || 'Something went wrong.');
        btn.disabled = false;
        btnText.textContent = 'Email me a sign-in link';
        return;
      }

      document.getElementById('form-state').classList.add('hidden');
      document.getElementById('sent-state').classList.remove('hidden');
      document.getElementById('sent-email').textContent = email;
      window.scrollTo({ top:0, behavior:'smooth' });
    } catch (err) {
      showError('Network error. Please try again.');
      btn.disabled = false;
      btnText.textContent = 'Email me a sign-in link';
    }
  });

  // Resend magic link
  document.getElementById('resend-btn').addEventListener('click', async () => {
    const email = document.getElementById('sent-email').textContent;
    const rs = document.getElementById('resend-status');
    rs.classList.remove('hidden');
    rs.textContent = 'Sending…';
    try {
      const { data } = await sendMagicLink(email);
      rs.textContent = data.message || 'Sent. Check your inbox.';
      rs.style.color = '#10b981';
    } catch (e) {
      rs.textContent = 'Something went wrong. Try again.';
      rs.style.color = '#ef4444';
    }
  });
</script>
</body>
</html>
