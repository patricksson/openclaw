<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose a new password — Automatyn</title>
    <meta name="robots" content="noindex">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23030303'/><text x='50' y='68' text-anchor='middle' font-family='sans-serif' font-weight='800' font-size='65' fill='%2322d3ee'>A</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://api.fontshare.com/v2/css?f[]=cabinet-grotesk@400;500;700;800&display=swap" rel="stylesheet">

    <style>
      html { -webkit-text-size-adjust:100%; }
      body { font-family:'DM Sans', sans-serif; background:#030303; color:#f5f5f5; -webkit-font-smoothing:antialiased; min-height:100vh; }
      .heading { font-family:'Cabinet Grotesk', sans-serif; letter-spacing:-0.04em; }
      .bg-ambient { position:relative; overflow:hidden; min-height:100vh; }
      .bg-ambient::before { content:""; position:absolute; inset:-40%; background:
        radial-gradient(600px 400px at 30% 0%, rgba(34,211,238,0.08), transparent 60%); pointer-events:none; z-index:0; }
      .glass { background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%);
        border:1px solid rgba(255,255,255,0.08); border-radius:20px; backdrop-filter: blur(14px);
        box-shadow: 0 30px 80px rgba(0,0,0,0.6); }
      .field { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.08); border-radius:12px;
        padding:.85rem 1rem; color:#fff; width:100%; font-size:15px; transition:border-color .15s; font-family:'DM Sans', sans-serif; }
      .field:focus { outline:none; border-color:#22d3ee; }
      .field::placeholder { color:#525252; }
      .cta-primary { background: linear-gradient(180deg, #10b981 0%, #059669 100%);
        box-shadow: 0 10px 30px rgba(16,185,129,0.25); transition: transform .15s; }
      .cta-primary:hover:not(:disabled) { transform: translateY(-1px); }
      .cta-primary:disabled { opacity:.5; cursor:not-allowed; }
      .fade-up { opacity:0; transform:translateY(12px); animation: fadeUp .6s ease forwards; }
      @keyframes fadeUp { to { opacity:1; transform:none } }
      .spin { border:2px solid rgba(255,255,255,0.2); border-top-color:#fff; border-radius:50%; width:16px; height:16px; animation: spin 1s linear infinite; display:inline-block; }
      @keyframes spin { to { transform:rotate(360deg); } }
      .strength-seg { flex:1; height:4px; border-radius:4px; background:#262626; transition:background .25s; }
      .strength-seg.on-weak { background:#ef4444; }
      .strength-seg.on-ok { background:#f59e0b; }
      .strength-seg.on-good { background:#22d3ee; }
      .strength-seg.on-strong { background:#10b981; }
      @media (max-width:480px){ .glass { border-radius:16px; } }
    </style>
</head>
<body class="bg-ambient">

<nav class="fixed top-0 w-full bg-black/90 backdrop-blur-md z-50 border-b border-white/5">
  <div class="max-w-6xl mx-auto px-4 sm:px-6 flex justify-between items-center h-16">
    <a href="/" class="heading text-2xl font-extrabold">Automatyn<span class="text-cyan-400">.</span></a>
  </div>
</nav>

<main class="pt-28 pb-12 px-4 relative z-10 flex justify-center">
  <div class="w-full max-w-md">

    <div id="form-state" class="glass p-7 sm:p-9 fade-up">
      <h1 class="heading text-3xl sm:text-4xl font-extrabold mb-2">New password</h1>
      <p class="text-sm sm:text-base text-gray-400 mb-7">Choose a strong password to secure your account.</p>

      <form id="form" class="space-y-5" novalidate>
        <div>
          <label class="block text-xs font-semibold text-gray-400 mb-2 uppercase tracking-wider" for="password">New password</label>
          <div class="relative">
            <input class="field pr-12" id="password" type="password" autocomplete="new-password" required minlength="8" maxlength="128" placeholder="At least 8 characters" />
            <button type="button" id="toggle-pw" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-gray-400 hover:text-white font-semibold px-2 py-1">Show</button>
          </div>
          <div class="flex gap-1 mt-2" id="strength-bar">
            <div class="strength-seg"></div><div class="strength-seg"></div><div class="strength-seg"></div><div class="strength-seg"></div>
          </div>
          <div class="text-xs text-gray-500 mt-1.5" id="strength-label">8+ characters</div>
        </div>

        <div id="error-box" class="hidden text-sm text-red-400 bg-red-950/30 border border-red-900/40 rounded-lg px-3 py-2.5"></div>

        <button id="submit-btn" type="submit" class="cta-primary w-full text-white py-3.5 rounded-xl font-semibold text-sm sm:text-base flex items-center justify-center gap-2">
          <span id="btn-text">Set new password</span>
        </button>
      </form>
    </div>

    <div id="success-state" class="glass p-7 sm:p-9 text-center hidden fade-up">
      <div class="w-16 h-16 rounded-full bg-emerald-500/15 border border-emerald-500/30 flex items-center justify-center mx-auto mb-5">
        <svg class="w-7 h-7 text-emerald-400" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/></svg>
      </div>
      <h2 class="heading text-2xl sm:text-3xl font-extrabold mb-3">Password updated</h2>
      <p class="text-gray-400 text-sm sm:text-base mb-6">You're signed in. Taking you to your dashboard…</p>
      <a href="/dashboard.html" class="cta-primary inline-block w-full text-white py-3 rounded-xl font-semibold">Go to dashboard →</a>
    </div>

    <div id="invalid-state" class="glass p-7 sm:p-9 text-center hidden fade-up">
      <div class="w-16 h-16 rounded-full bg-red-500/15 border border-red-500/30 flex items-center justify-center mx-auto mb-5">
        <svg class="w-7 h-7 text-red-400" fill="none" stroke="currentColor" stroke-width="3" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
      </div>
      <h2 class="heading text-2xl sm:text-3xl font-extrabold mb-3">Link invalid or expired</h2>
      <p class="text-gray-400 text-sm sm:text-base mb-6">This reset link didn't work. It may have expired or been used already.</p>
      <a href="/forgot-password.html" class="cta-primary inline-block w-full text-white py-3 rounded-xl font-semibold">Request a new link</a>
    </div>

  </div>
</main>

<script>
  const API = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? 'http://localhost:3001'
    : 'https://api.automatyn.co';

  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');

  if (!token) {
    document.getElementById('form-state').classList.add('hidden');
    document.getElementById('invalid-state').classList.remove('hidden');
  }

  const pwInput = document.getElementById('password');
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const b = document.getElementById('toggle-pw');
    if (pwInput.type === 'password') { pwInput.type='text'; b.textContent='Hide'; }
    else { pwInput.type='password'; b.textContent='Show'; }
  });

  const segs = document.querySelectorAll('#strength-bar .strength-seg');
  const strengthLabel = document.getElementById('strength-label');
  function assess(pw) {
    let s = 0;
    if (pw.length >= 8) s++;
    if (pw.length >= 12) s++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
    if (/\d/.test(pw) || /[^A-Za-z0-9]/.test(pw)) s++;
    return Math.min(s, 4);
  }
  pwInput.addEventListener('input', () => {
    const pw = pwInput.value;
    const s = pw.length === 0 ? 0 : assess(pw);
    const levels = [['','8+ characters'],['on-weak','Weak'],['on-ok','OK'],['on-good','Strong'],['on-strong','Very strong']];
    segs.forEach((seg,i) => seg.className = 'strength-seg' + (i<s && s>0 ? ' '+levels[s][0] : ''));
    strengthLabel.textContent = levels[s][1];
    strengthLabel.style.color = s>=3 ? '#10b981' : (s>=2 ? '#f59e0b' : (s>=1 ? '#ef4444' : '#737373'));
  });

  const form = document.getElementById('form');
  const btn = document.getElementById('submit-btn');
  const btnText = document.getElementById('btn-text');
  const errBox = document.getElementById('error-box');

  if (form) {
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errBox.classList.add('hidden');
      const password = pwInput.value;
      if (password.length < 8) { errBox.textContent = 'Password must be at least 8 characters.'; errBox.classList.remove('hidden'); return; }

      btn.disabled = true;
      btnText.innerHTML = '<span class="spin"></span> Updating…';

      try {
        const res = await fetch(`${API}/api/auth/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();

        if (!res.ok) {
          // Invalid/expired token — show dedicated state
          if (res.status === 400 && (data.error || '').toLowerCase().includes('link')) {
            document.getElementById('form-state').classList.add('hidden');
            document.getElementById('invalid-state').classList.remove('hidden');
            return;
          }
          errBox.textContent = data.error || 'Password update failed.';
          errBox.classList.remove('hidden');
          btn.disabled = false;
          btnText.textContent = 'Set new password';
          return;
        }

        if (data.token) localStorage.setItem('automatyn_jwt', data.token);
        if (data.agentId) localStorage.setItem('automatyn_agent', data.agentId);
        if (data.email) localStorage.setItem('automatyn_email', data.email);

        document.getElementById('form-state').classList.add('hidden');
        document.getElementById('success-state').classList.remove('hidden');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1800);
      } catch (err) {
        errBox.textContent = 'Network error. Please try again.';
        errBox.classList.remove('hidden');
        btn.disabled = false;
        btnText.textContent = 'Set new password';
      }
    });
  }
</script>
</body>
</html>
